kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: workhub
networking:
  kubeProxyMode: nftables
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: KubeProxyConfiguration
        apiVersion: kubeproxy.config.k8s.io/v1alpha1
        mode: nftables
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
